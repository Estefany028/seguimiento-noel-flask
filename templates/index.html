<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Seguimiento de Colaboradores – Noel</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<header class="banner-img"></header>

<main>

  <!-- Barra superior: buscador + filtro empresa + acceso admin -->
  <div class="topbar">
    <div class="search-box" style="display:flex; gap:10px; align-items:center;">
      <input type="text" id="buscador" placeholder="Buscar por cédula…">

      <!-- NUEVO: filtro empresa (externo) -->
      <select id="filtroEmpresa" class="select">
        <option value="">Todas las empresas</option>
      </select>
    </div>

    <div class="admin-box">
      <input type="password" id="adminToken" placeholder="Contraseña Administrador">
      <button id="btnEntrarAdmin">Entrar</button>
      <button id="btnSalirAdmin" class="hidden">Salir</button>
      <div id="modo" class="modo"></div>
    </div>
  </div>

  <div id="pillUpdate" class="update-pill">Actualizando datos...</div>

  <!-- ===== VISTA EXTERNO ===== -->
  <section id="vistaExterno">
    <div class="table-wrapper">
      <table id="tabla">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Empresa</th>
            <th>Inducción</th>
            <th>Seguridad Social</th>
            <th>Estado General</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <footer>
      Sistema interno · Uso corporativo
    </footer>
  </section>

  <!-- ===== VISTA ADMIN ===== -->
    <section id="vistaAdmin" class="hidden">

    <div class="adminHeaderRow">

      <div class="miniStats">
        <div class="chip"><span>Activos</span><b id="statTotal">0</b></div>
        <div class="chip ok"><span>Cumplen</span><b id="statCumple">0</b></div>
        <div class="chip warn"><span>Revisar</span><b id="statRevisar">0</b></div>
      </div>

    </div>

    <div id="contenedorSolicitudes"></div>

    <footer>
      Sistema interno · Vista Administrador
    </footer>

  </section>

</main>

<!-- MODAL EXTERNO (REVISAR) -->
<div id="modal" class="modal">
  <div class="modal-card">
    <h3>Documentos por actualizar</h3>
    <p id="modalMotivo" style="margin-top:10px;"></p>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfw8xlAPb6jy3wOwQv_paagntFYpSsAHQ4adLsGQMVCGVrcVg/viewform"
       target="_blank"
       class="badge warn"
       style="display:inline-block; margin-top:14px;">
      Actualizar documentos
    </a>

    <div style="text-align:right; margin-top:20px;">
      <button onclick="cerrarModal()">Cerrar</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
