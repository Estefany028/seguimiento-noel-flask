<!-- admin.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Seguimiento Admin – Galletas Noel</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

<header></header>

<main>

  <!-- Topbar admin: filtro empresa + stats mini -->
  <div class="topbar admin-only">
    <div class="filters-left">
      <div class="filter-box">
        <select id="filtroEmpresa">
          <option value="">Todas las empresas</option>
        </select>
      </div>
    </div>

    <div class="miniStats">
      <div class="chip"><span>Activos</span><b id="statTotal">0</b></div>
      <div class="chip ok"><span>Cumplen</span><b id="statCumple">0</b></div>
      <div class="chip warn"><span>Revisar</span><b id="statRevisar">0</b></div>
    </div>
  </div>

  <div id="adminSolicitudes"></div>

  <footer>
    Sistema interno · Vista Administrador
  </footer>

</main>

<script src="/static/app.js"></script>
<script>
  // Inicializar modo admin
  window.__MODE__ = "admin";
</script>

</body>
</html>
